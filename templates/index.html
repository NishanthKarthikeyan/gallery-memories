<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="oXT5X4jHcwXBKlODsRyr_1iwapuBOVpA0_8Pm52wQng" />
  <title>Nishanth K - Memory Gallery</title>
  <meta name="description" content="Exclusive private gallery and digital vault by Nishanth K. Store, organize and relive precious memories securely. A project associated with nishanthk.site.">
  <meta name="keywords" content="Nishanth K, nishanthk.site, Memory Gallery, Nishanth Gallery, Portfolio, Private Gallery, Photo Vault">
  <meta name="author" content="Nishanth K">
  <meta property="og:title" content="Nishanth K - Memory Gallery">
  <meta property="og:description" content="Exclusive private gallery and digital vault by Nishanth K.">
  <meta property="og:type" content="website">
  <link rel="author" href="https://nishanthk.site">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans:['Inter','sans-serif'], display:['Noto Serif JP', 'serif'] },
          colors: {
            frost:{ DEFAULT:'#89CFF0', light:'#B0E0E6', dark:'#4682B4', glow:'rgba(137,207,240,0.35)' },
            crimson:{ DEFAULT:'#4682B4', glow:'rgba(70,130,180,0.25)' },
            ink:{ DEFAULT:'#0A0A10', glow:'rgba(10,10,16,0.25)' }
          }
        }
      }
    }
  </script>
  <style>
    /* ─── Custom Background ─────────────────────── */
    body {
      background: url('/static/bg.jpg') center/cover no-repeat fixed;
      background-color: #0A0A10;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      color: white;
      min-height: 100vh;
    }
    /* Removed stars CSS */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .aurora {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .aurora::before {
      content: '';
      position: absolute; width: 900px; height: 900px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(137,207,240,0.15) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: auroraMove1 18s ease-in-out infinite alternate;
    }
    .aurora::after {
      content: '';
      position: absolute; width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(70,130,180,0.15) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: auroraMove2 14s ease-in-out infinite alternate;
    }
    .aurora-mid {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(176,224,230,0.1) 0%, transparent 70%);
      top: 40%; left: 50%; transform: translate(-50%,-50%);
      animation: auroraMove3 20s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    @keyframes auroraMove1 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(200px,150px) scale(1.3)} }
    @keyframes auroraMove2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-180px,-120px) scale(1.2)} }
    @keyframes auroraMove3 { 0%{transform:translate(-50%,-50%) scale(1)} 100%{transform:translate(-50%,-50%) scale(1.5)} }

    /* ─── Glass panels ──────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(137,207,240,0.08);
    }
    .glass-card {
      background: rgba(20,15,20,0.6);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(137,207,240,0.15);
    }
    .glass-login {
      background: rgba(15,10,15,0.8);
      backdrop-filter: blur(40px) saturate(220%);
      -webkit-backdrop-filter: blur(40px) saturate(220%);
      border: 1px solid rgba(137,207,240,0.2);
      box-shadow: 0 0 80px rgba(70,130,180,0.15), 0 0 40px rgba(137,207,240,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* ─── Frost gradient text ────────────────────── */
    .frost-text {
      background: linear-gradient(135deg, #B0E0E6 0%, #89CFF0 40%, #4682B4 80%, #B0E0E6 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 5s linear infinite;
    }
    @keyframes shimmerText { 0%{background-position:0%} 100%{background-position:200%} }

    /* ─── Glow button ───────────────────────────── */
    .btn-frost {
      background: linear-gradient(135deg, #89CFF0, #4682B4);
      box-shadow: 0 4px 20px rgba(137,207,240,0.3);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden;
      color: #0A0A10;
    }
    .btn-frost::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-frost:hover { transform: translateY(-2px); box-shadow: 0 8px 35px rgba(137,207,240,0.5); }
    .btn-frost:hover::after { opacity: 1; }
    .btn-frost:active { transform: translateY(0); }

    .btn-outline {
      border: 1px solid rgba(137,207,240,0.3);
      color: rgba(137,207,240,0.9);
      background: rgba(137,207,240,0.05);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .btn-outline:hover { background: rgba(137,207,240,0.15); border-color: rgba(137,207,240,0.6); color: #FFF; box-shadow: 0 0 20px rgba(137,207,240,0.2); transform: translateY(-1px); }

    /* ─── Animated border card ──────────────────── */
    .album-card {
      position: relative; border-radius: 16px; overflow: hidden;
      cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      background: rgba(20,15,20,0.55);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .album-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 16px;
      background: linear-gradient(135deg, rgba(137,207,240,0) 0%, rgba(137,207,240,0.1) 50%, rgba(137,207,240,0) 100%);
      opacity: 0; transition: opacity 0.5s; z-index: 1; pointer-events: none;
    }
    .album-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(137,207,240,0.3), 0 0 40px rgba(137,207,240,0.15); }
    .album-card:hover::before { opacity: 1; }
    .album-card .thumb { transition: transform 0.7s cubic-bezier(0.4,0,0.2,1); }
    .album-card:hover .thumb { transform: scale(1.1) rotate(1deg); }
    .album-card .badge { background: linear-gradient(135deg,#89CFF0,#4682B4); box-shadow: 0 4px 12px rgba(137,207,240,0.4); color: #0A0A10; }

    /* ─── Image cards ───────────────────────────── */
    .img-card {
      border-radius: 12px; overflow: hidden; position: relative;
      background: rgba(20,15,20,0.5); border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .img-card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(137,207,240,0.2); }
    .img-card .thumb { transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
    .img-card:hover .thumb { transform: scale(1.08); }
    .img-card .overlay { background: linear-gradient(0deg, rgba(10,10,16,0.9) 0%, rgba(10,10,16,0.2) 50%, transparent 100%); transition: opacity 0.3s; }

    /* ─── Input fields ──────────────────────────── */
    .field {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: white; transition: all 0.3s;
      padding: 14px 16px 14px 48px;
      width: 100%;
      font-size: 14px;
    }
    .field::placeholder { color: rgba(255,255,255,0.2); }
    .field:focus { outline: none; border-color: rgba(137,207,240,0.5); background: rgba(137,207,240,0.05); box-shadow: 0 0 0 3px rgba(137,207,240,0.1); }

    /* ─── Frost Particles ─────────────────────────────── */
    .frost-petal {
      position: fixed; pointer-events: none; z-index: 1;
      animation: fall linear infinite, sway ease-in-out infinite alternate;
      font-size: 14px;
      opacity: 0.7;
      text-shadow: 0 0 5px rgba(137,207,240,0.5);
    }
    @keyframes fall {
      0%   { top: -10%; }
      100% { top: 110%; }
    }
    @keyframes sway {
      0%   { transform: translateX(0) rotate(0deg); }
      100% { transform: translateX(100px) rotate(360deg); }
    }

    /* ─── Glowing Orbs ─────────────────────────────── */
    .firefly {
      position: absolute; border-radius: 50%;
      background: #B0E0E6;
      box-shadow: 0 0 10px #89CFF0, 0 0 20px #89CFF0;
      opacity: 0.5; pointer-events: none;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
      50% { opacity: 0.7; }
      100% { transform: translate(60px, -60px) scale(1.5); opacity: 0.1; }
    }

    /* ─── Stats card ────────────────────────────── */
    .stat-card {
      background: rgba(137,207,240,0.05);
      border: 1px solid rgba(137,207,240,0.12);
      border-radius: 14px; padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; transition: all 0.3s;
    }
    .stat-card:hover { background: rgba(137,207,240,0.1); border-color: rgba(137,207,240,0.25); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(137,207,240,0.05); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg,#89CFF0,#4682B4);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(137,207,240,0.3);
      flex-shrink: 0;
      color: #0A0A10;
    }

    /* ─── Header glow line ──────────────────────── */
    .header-line { border-bottom: 1px solid; border-image: linear-gradient(90deg,transparent,rgba(137,207,240,0.3),transparent) 1; }

    /* ─── Search ────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-wrap input { padding-left: 48px; }
    .search-glow:focus-within { box-shadow: 0 0 0 2px rgba(137,207,240,0.2); border-radius: 12px; }

    /* ─── Viewer ────────────────────────────────── */
    #image-viewer { display:none; }
    #image-viewer.active { display:flex; animation: fadeInViewer 0.4s ease; }
    @keyframes fadeInViewer { from{opacity:0; backdrop-filter:blur(0px);} to{opacity:1; backdrop-filter:blur(25px);} }

    /* ─── Time Machine Slider ───────────────────── */
    #time-machine-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #B0E0E6;
      box-shadow: 0 0 15px rgba(137,207,240,0.8), inset 0 0 5px rgba(255,255,255,0.8);
      cursor: pointer;
      border: 2px solid rgba(137,207,240,0.3);
      transition: transform 0.2s;
    }
    #time-machine-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    #time-machine-slider::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%; background: #B0E0E6;
      box-shadow: 0 0 15px rgba(137,207,240,0.8); cursor: pointer; border: none;
    }

    /* ─── Toast ─────────────────────────────────── */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 9999; padding: 12px 32px 16px 32px; border-radius: 50px;
      font-weight: 600; font-size: 13px; letter-spacing: 0.05em;
      background: linear-gradient(135deg,#89CFF0,#4682B4);
      color: #0A0A10; box-shadow: 0 10px 40px rgba(137,207,240,0.4);
      animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap; overflow: hidden;
    }
    #toast::after {
      content: ''; position: absolute; bottom: 0; left: 0; height: 4px; background: #4682B4;
      width: 100%; animation: toastProgress 3.2s linear forwards;
    }
    #toast.hidden { display: none; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.9)} to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }
    @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }

    /* ─── Custom Animations ─────────────────────── */
    .stagger-item { opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    #image-viewer.active #full-image { animation: viewerZoom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes viewerZoom { from { opacity:0; transform:scale(0.9) } to { opacity:1; transform:scale(1) } }

    /* ─── Custom Cursor ─────────────────────────── */
    .cursor-dot {
      width: 6px; height: 6px; background: #89CFF0; border-radius: 50%;
      position: fixed; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%); transition: transform 0.1s;
      box-shadow: 0 0 10px #89CFF0, 0 0 20px #89CFF0;
    }
    .cursor-trail {
      width: 30px; height: 30px; border: 1px solid rgba(137,207,240,0.5); border-radius: 50%;
      position: fixed; pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background 0.2s;
      transition-timing-function: ease-out;
    }
    body:hover .cursor-dot, body:hover .cursor-trail { opacity: 1; }
    a:hover ~ .cursor-trail, button:hover ~ .cursor-trail, .album-card:hover ~ .cursor-trail, .img-card:hover ~ .cursor-trail, input:focus ~ .cursor-trail {
      width: 50px; height: 50px; background: rgba(137,207,240,0.1); border-color: transparent;
    }

    /* ─── Logo glow ring ────────────────────────── */
    .logo-ring {
      position: relative;
    }
    .logo-ring::before {
      content: ''; position: absolute; inset: -4px; border-radius: 20px;
      background: linear-gradient(135deg,#B0E0E6,#89CFF0,#4682B4);
      background-size: 200% 200%; animation: shimmerText 3s linear infinite;
      z-index: -1; filter: blur(8px); opacity: 0.6;
    }

    /* ─── Scrollbar ─────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background: rgba(137,207,240,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(137,207,240,0.5); }

    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ─── Music btn ─────────────────────────────── */
    .music-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(20,15,20,0.8); backdrop-filter: blur(20px);
      border: 1px solid rgba(137,207,240,0.25);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .music-btn:hover { background: rgba(137,207,240,0.15); box-shadow: 0 0 25px rgba(137,207,240,0.3); transform: scale(1.05); }

    /* ─── Section label ─────────────────────────── */
    .section-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(137,207,240,0.08); border: 1px solid rgba(137,207,240,0.2);
      border-radius: 50px; padding: 6px 16px; font-size: 11px;
      font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(137,207,240,0.9);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <!-- Loading Splash Screen -->
  <div id="splash-screen" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center transition-opacity duration-1000" style="background: #0A0A10;">
    <div class="logo-ring inline-block mb-6 animate-pulse">
      <div class="w-[100px] h-[100px] rounded-[30px] flex items-center justify-center mx-auto"
           style="background:linear-gradient(135deg,#89CFF0,#4682B4);box-shadow:0 10px 35px rgba(137,207,240,0.6)">
        <i class="fas fa-snowflake text-[#0A0A10] text-5xl fa-spin" style="animation-duration: 4s;"></i>
      </div>
    </div>
    <h2 class="font-display text-2xl font-black text-white tracking-widest uppercase mt-4">Initializing Vault</h2>
  </div>

  <!-- Drag & Drop Overlay -->
  <div id="drop-zone" class="fixed inset-0 z-[9999] bg-[#0A0A10]/80 backdrop-blur-md hidden flex-col items-center justify-center border-4 border-dashed border-[#89CFF0] m-4 rounded-3xl transition-all">
    <i class="fas fa-cloud-upload-alt text-6xl text-[#89CFF0] mb-4 animate-bounce"></i>
    <p class="text-3xl font-display font-bold text-white tracking-wider">Drop memories here to upload</p>
  </div>

  <!-- Aurora background -->
  <div class="aurora"></div>
  <div class="aurora-mid"></div>

  <!-- Frost Particles container -->
  <div id="particles" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <!-- Music button -->
  <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
  <button id="music-btn" class="music-btn" title="Toggle Music">
    <i class="fas fa-music text-frost-light text-sm" style="color:#B0E0E6"></i>
  </button>

  <!-- ══════════════════════════════════════════════════
       LOGIN PAGE
  ══════════════════════════════════════════════════ -->
  <div id="login-container" class="hidden relative z-10 flex items-center justify-center min-h-screen px-4 py-12">
    <div class="glass-login rounded-3xl p-10 w-full max-w-[420px] fade-in">

      <!-- Brand -->
      <div class="text-center mb-9">
        <div class="logo-ring inline-block mb-6">
          <div class="w-[76px] h-[76px] rounded-[22px] flex items-center justify-center mx-auto"
               style="background:linear-gradient(135deg,#89CFF0,#4682B4);box-shadow:0 10px 35px rgba(137,207,240,0.4)">
            <i class="fas fa-torii-gate text-[#0A0A10] text-3xl"></i>
          </div>
        </div>
        <h1 class="font-display text-5xl font-black frost-text leading-none tracking-tight mb-3">Nishanth Gallery</h1>
        <div class="section-pill mx-auto mt-2">
          <i class="fas fa-seedling text-[9px]"></i> Family Memories
        </div>
      </div>

      <!-- Form -->
      <form id="login-form" class="space-y-5">
        <div class="relative">
          <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-frost/50 text-sm z-10" style="color:rgba(137,207,240,0.5)"></i>
          <input id="username" type="text" placeholder="Family Head" value="nishanth" required class="field">
        </div>
        <div class="relative">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-frost/50 text-sm z-10" style="color:rgba(137,207,240,0.5)"></i>
          <input id="password" type="password" placeholder="Access Code" value="knh@2005" required class="field">
        </div>
        <button type="submit" class="btn-frost w-full py-[16px] rounded-xl font-bold text-sm tracking-wide mt-2 flex items-center justify-center gap-2">
          <i class="fas fa-door-open"></i> Unlock Memories
        </button>
      </form>

      <p class="text-center text-white/90 text-xs mt-8 tracking-wide">🔒 Forever Encrypted Vault</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       MAIN GALLERY
  ══════════════════════════════════════════════════ -->
  <main id="photo-gallery" class="hidden relative z-10 max-w-7xl mx-auto px-4 sm:px-6 py-10 fade-in">

    <!-- Header -->
    <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-5 mb-10 pb-8 header-line">
      <div class="flex items-center gap-5">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0"
             style="background:linear-gradient(135deg,#89CFF0,#4682B4);box-shadow:0 6px 20px rgba(137,207,240,0.3)">
          <i class="fas fa-fan text-[#0A0A10] text-xl"></i>
        </div>
        <div>
          <h1 class="font-display text-4xl font-black frost-text leading-tight">Nishanth Gallery</h1>
          <p class="text-white/80 text-xs tracking-[0.2em] uppercase mt-1">Our Family Memories</p>
        </div>
      </div>
      <div class="flex gap-3 flex-wrap">
        <button onclick="syncFromCloud()" class="btn-outline flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium">
          <i class="fas fa-cloud-download-alt text-xs"></i> Sync Cloud
        </button>
        <button onclick="exportImages()" class="btn-outline flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium">
          <i class="fas fa-box-open text-xs"></i> Export
        </button>
        <button id="logout-button" onclick="window.location.href='/logout'" class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium text-white/80 border border-white/10 hover:bg-white/5 hover:text-white/70 transition-all">
          <i class="fas fa-sign-out-alt text-xs"></i> Logout
        </button>
      </div>
    </header>

    <!-- Stats -->
    <div id="stats-bar" class="flex gap-4 mb-10 overflow-x-auto pb-2" style="-ms-overflow-style:none;scrollbar-width:none"></div>

<script>
  const API_URL = "";
  const CREDENTIALS = { user:"Nishanth", pass:"knh@2005", private:"100905" };
  let MASTER_DATA=[], folderImages=[], activeIndex=0, isPrivateMode=false, currentCategory=null;
  let activeTagFilter = null;
  let selectMode = false;
  let selectedImages = new Set();

  const CATEGORIES = {
    mumbai:           { title:"Mumbai Magic 🏙️",        desc:"Marine Drive & Gateway of India.",   icon:"https://images.unsplash.com/photo-1570168007204-dfb528c6958f?w=500&q=80" },
    tirupati:         { title:"Tirupathi Darshan 🕉️",   desc:"Holy pilgrimage to Lord Venkatesha.", icon:"https://www.divyayatra.com/Admin/packages/Tirupati%20Package%20%202%20night%203%20days%20.png" },
    family:           { title:"Family Moments 👨‍👩‍👧‍👦",  desc:"Joys, laughter and togetherness.",    icon:"https://images.unsplash.com/photo-1511895426328-dc8714191011?w=500&q=80" },
    Me:               { title:"Nishanth's Snaps 📷",    desc:"My personal travel & lifestyle.",      icon:"https://i.pinimg.com/736x/32/37/5b/32375b7226f48e223c37f125eece540f.jpg" },
    "Room 103":       { title:"Room 103 🛏️",             desc:"My cozy little space.",                icon:"https://m.media-amazon.com/images/M/MV5BYmUyNTgzNDktZjdmNS00ZTZlLWFjZTgtNGY1NjA5MDA2NGJiXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" },
    Thiruvannarmalai: { title:"Thiruvannarmalai 🔱",    desc:"Sacred spiritual journey.",             icon:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYP-F72A65I2oCzlCFYfxt-zbatJAymvK32Q&s" },
    "Pongal 2k25":    { title:"Pongal 2k26 🌾",          desc:"Festival of harvest & joy.",           icon:"https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=500&q=80" },
    private:          { title:"Private Vault 🔒",        desc:"Secure personal corner.",              icon:"https://play-lh.googleusercontent.com/UCj2ASWhcSKo9qlHMclOwKNBIRFhXPQnqAaCLHNm1Mj6CMZ0NqlsLjeR1QF631MxzUs5" }
  };

  /* ── Helpers & Cursor ───────────────────────────── */
  const cursorDot = document.createElement('div'); cursorDot.className = 'cursor-dot hidden sm:block';
  const cursorTrail = document.createElement('div'); cursorTrail.className = 'cursor-trail hidden sm:block';
  document.body.appendChild(cursorDot); document.body.appendChild(cursorTrail);
  let mouseX=0, mouseY=0, trailX=0, trailY=0;
  document.addEventListener('mousemove', e => {
    mouseX=e.clientX; mouseY=e.clientY;
    cursorDot.style.left = mouseX+'px'; cursorDot.style.top = mouseY+'px';
  });
  function animateTrail() {
    trailX += (mouseX - trailX) * 0.15;
    trailY += (mouseY - trailY) * 0.15;
    cursorTrail.style.left = trailX+'px'; cursorTrail.style.top = trailY+'px';
    requestAnimationFrame(animateTrail);
  }
  animateTrail();

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerHTML = msg; 
    t.classList.remove('hidden');
    t.style.animation = 'none'; t.offsetHeight; t.style.animation = null; // Re-trigger animation
    clearTimeout(t._t); t._t = setTimeout(()=>t.classList.add('hidden'), 3200);
  }
  function show(id){ document.getElementById(id).classList.remove('hidden'); }
  function hide(id){ document.getElementById(id).classList.add('hidden'); }

  /* ── Data ───────────────────────────────────────── */
  async function syncMemories() {
    try {
      const r = await fetch(`${API_URL}/images`);
      if (r.ok) {
        MASTER_DATA = await r.json();
        renderCategories(); updateStats();
        if (currentCategory) { isPrivateMode ? openSubFolder(currentCategory) : renderImages(); }
      }
    } catch(e){ console.error(e); }
  }

  async function syncFromCloud() {
    showToast("<i class='fas fa-cloud-download-alt'></i> Pulling from Cloudinary…");
    try {
      const r = await fetch(`${API_URL}/sync`);
      const d = await r.json();
      if (r.ok) { showToast(`✨ ${d.message}`); syncMemories(); }
    } catch { showToast("❌ Sync error!"); }
  }

  async function exportImages() {
    showToast("<i class='fas fa-box'></i> Preparing export…");
    try {
      const r = await fetch(`${API_URL}/export${currentCategory ? `?category=${currentCategory}` : ''}`);
      if (r.ok) {
        const blob = await r.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'export.zip';
        a.click();
        window.URL.revokeObjectURL(url);
        showToast("✨ Export downloaded!");
      } else {
        showToast("❌ Export failed!");
      }
    } catch { showToast("❌ Export error!"); }
  }

  /* ── Stats ──────────────────────────────────────── */
  function updateStats() {
    const bar = document.getElementById('stats-bar');
    const stats = [
      { icon:'fa-images', label:'Memories', val:MASTER_DATA.length, color:'#89CFF0' },
      { icon:'fa-book-open', label:'Albums', val:Object.keys(CATEGORIES).length, color:'#818cf8' },
      { icon:'fa-heart', label:'Favorites', val:MASTER_DATA.filter(m=>m.fav).length, color:'#f43f5e' },
    ];
    bar.innerHTML = stats.map(s=>`
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,${s.color}CC,${s.color})">
          <i class="fas ${s.icon} text-[#0A0A10] text-sm"></i>
        </div>
        <div>
          <p class="text-white font-black text-2xl leading-none font-display mb-1">${s.val}</p>
          <p class="text-white/80 text-[13px] font-bold tracking-widest uppercase">${s.label}</p>
        </div>
      </div>`).join('');
  }


  /* ── Category grid ──────────────────────────────── */
  document.getElementById('search-input').addEventListener('keyup', function(e) {
    const q = this.value.trim().toLowerCase();
    if (e.key === 'Enter' || e.keyCode === 13) {
      if (q === '143') {
        this.value = '';
        showPinPad();
        return;
      }
    }
    renderCategories(q);
  });

  function renderCategories(query="") {
    const grid = document.getElementById('category-grid');
    grid.innerHTML='';
    let i = 0;
    for (let key in CATEGORIES) {
      if (key === 'private') continue; // Hide from grid
      if (!CATEGORIES[key].title.toLowerCase().includes(query)) continue;
      let count = 0;
      let icon = CATEGORIES[key].icon; // Fallback icon
      
      const imgs = MASTER_DATA.filter(m=>m.category===key);
      count = imgs.length;
      if(count > 0) icon = imgs[imgs.length - 1].url;
      
      addAlbumCard(grid, key, CATEGORIES[key].title, icon, CATEGORIES[key].desc, count, i++);
    }
  }

  function addAlbumCard(grid, key, title, icon, desc, count, index) {
    const card = document.createElement('div');
    card.className = 'album-card stagger-item';
    card.style.animationDelay = `${index * 0.08}s`;
    card.innerHTML = `
      <div class="relative overflow-hidden" style="height:190px">
        <img src="${icon}" alt="${title}" class="thumb w-full h-full object-cover" loading="lazy"
             onerror="this.src='https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?w=400&q=80'">
        <div class="absolute inset-0" style="background:linear-gradient(0deg,rgba(10,10,16,0.95) 0%,rgba(10,10,16,0.3) 50%,transparent 100%)"></div>
        <div class="badge absolute top-3 right-3 text-[13px] font-black px-3 py-1.5 rounded-full text-[#0A0A10]">
          ${count} <span class="font-medium opacity-80">pics</span>
        </div>
        ${key==='private'?'<div class="absolute top-3 left-3 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md border border-white/20"><i class="fas fa-lock text-frost-light text-sm" style="color:#B0E0E6"></i></div>':''}
      </div>
      <div class="p-5">
        <p class="text-white font-display font-bold text-lg leading-tight truncate tracking-wide">${title}</p>
        <p class="text-white/80 text-xs mt-1.5 truncate font-serif italic">${desc}</p>
      </div>`;
    card.onclick = () => openCategory(key);
    grid.appendChild(card);
  }

  /* ── Navigation ─────────────────────────────────── */
  function openCategory(key) {
    if (key==='private') {
      showPinPad();
      return;
    }
    isPrivateMode=false; currentCategory=key;
    hide('photo-gallery'); show('category-detail-view');
    document.getElementById('detail-title').textContent = CATEGORIES[key].title;
    document.getElementById('detail-description').textContent = CATEGORIES[key].desc;
    renderImages();
    localStorage.setItem('currentView', key);
  }

  function renderSubCategories() {
    const grid = document.getElementById('sub-category-grid');

  /* ── Time Machine Slider Logic ──────────────────── */
  let tmTimeout;
  function initTimeMachine(images) {
    const tmContainer = document.getElementById('time-machine-container');
    const tmSlider = document.getElementById('time-machine-slider');
    const tmMinLabel = document.getElementById('tm-min-year');
    const tmMaxLabel = document.getElementById('tm-max-year');

    // Extract unique years
    let years = [];
    images.forEach(img => {
      if (img.date) {
        const match = img.date.match(/\d{4}/);
        if (match && !years.includes(parseInt(match[0]))) {
          years.push(parseInt(match[0]));
        }
      }
    });
    years.sort((a,b) => a - b);

    if (years.length > 1) {
      tmContainer.classList.remove('hidden');
      tmContainer.classList.add('flex');
      
      const minYear = years[0];
      const maxYear = years[years.length - 1];
      
      tmSlider.min = minYear;
      tmSlider.max = maxYear;
      tmSlider.value = maxYear;
      
      tmMinLabel.textContent = minYear;
      tmMaxLabel.textContent = maxYear;
      
      tmSlider.oninput = (e) => {
        const val = e.target.value;
        const bg = document.getElementById('time-machine-bg');
        const text = document.getElementById('time-machine-text');
        
        text.textContent = val;
        bg.classList.replace('opacity-0', 'opacity-100');
        
        clearTimeout(tmTimeout);
        tmTimeout = setTimeout(() => {
          bg.classList.replace('opacity-100', 'opacity-0');
        }, 1500);
      };
      
      tmSlider.onchange = (e) => {
        const val = parseInt(e.target.value);
        // Find closest year that actually exists in our data
        let closestYear = years.reduce((prev, curr) => Math.abs(curr - val) < Math.abs(prev - val) ? curr : prev);
        
        // Find the first image card with this year
        const cards = document.querySelectorAll('.img-card');
        for (let card of cards) {
          if (card.getAttribute('data-year') == closestYear) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            break;
          }
        }
      };
    } else {
      tmContainer.classList.add('hidden');
      tmContainer.classList.remove('flex');
    }
  }

  /* ── Vault PIN Pad Logic ────────────────────────── */
  let currentPin = "";

  function handlePinKeydown(e) {
    if (!document.getElementById('pin-pad-modal').classList.contains('flex')) return;
    if (e.key >= '0' && e.key <= '9') {
      pressPin(e.key);
    } else if (e.key === 'Backspace') {
      deletePin();
    } else if (e.key === 'Escape') {
      cancelPin();
    }
  }
  document.addEventListener('keydown', handlePinKeydown);
  function showPinPad() {
    currentPin = "";
    updatePinDots();
    document.getElementById('pin-pad-modal').classList.remove('hidden');
    document.getElementById('pin-pad-modal').classList.add('flex');
    document.getElementById('pin-msg').textContent = "Enter your access code";
    document.getElementById('pin-msg').classList.remove('text-red-400');
    document.getElementById('pin-msg').classList.add('text-white/80');
  }

  function hidePinPad() {
    document.getElementById('pin-pad-modal').classList.add('hidden');
    document.getElementById('pin-pad-modal').classList.remove('flex');
  }

  function pressPin(num) {
    if (currentPin.length < 6) {
      currentPin += num;
      updatePinDots();
      if (currentPin.length === 6) {
        verifyPin();
      }
    }
  }

  function deletePin() {
    if (currentPin.length > 0) {
      currentPin = currentPin.slice(0, -1);
      updatePinDots();
    }
  }
  
  function cancelPin() {
    hidePinPad();
  }

  function updatePinDots() {
    const dotsContainer = document.getElementById('pin-dots');
    dotsContainer.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      if (i < currentPin.length) {
        dotsContainer.innerHTML += `<div class="w-3 h-3 rounded-full bg-frost shadow-[0_0_10px_rgba(137,207,240,0.8)]"></div>`;
      } else {
        dotsContainer.innerHTML += `<div class="w-3 h-3 rounded-full bg-white/10 border border-white/20"></div>`;
      }
    }
  }

  function verifyPin() {
    if (currentPin === CREDENTIALS.private) {
      // Success
      document.getElementById('pin-msg').textContent = "Access Granted";
      document.getElementById('pin-msg').classList.replace('text-white/80', 'text-green-400');
      document.getElementById('pin-msg').classList.replace('text-red-400', 'text-green-400');
      setTimeout(() => {
        hidePinPad();
        hide('photo-gallery'); show('sub-category-view'); renderSubCategories(); 
        localStorage.setItem('currentView', 'private');

    } else {
      // Error

      box.classList.add('animate-shake');
      document.getElementById('pin-msg').textContent = "Incorrect Code";
      document.getElementById('pin-msg').classList.remove('text-white/80', 'text-green-400');

      setTimeout(() => {

  async function downloadCurrentImage() {
    const it = folderImages[activeIndex];

    showToast("<i class='fas fa-download'></i> Starting download...");
    try {
      const response = await fetch(it.url);
      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);

    if(!files.length) return;
    if(currentCategory === 'private' || currentCategory === 'reshma' || currentCategory === 'deepa') {
      showToast("❌ Upload to a specific album first."); return;
    }
    showToast(`<i class="fas fa-spinner fa-spin"></i> Uploading ${files.length} memories...`);
    const formData = new FormData();
    for(let i=0; i<files.length; i++) formData.append('file', files[i]);
    formData.append('category', currentCategory || 'others');
    
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      if(res.ok) {
        showToast("✨ Memories uploaded successfully!");
        syncMemories(); // Refresh the gallery
      } else {
        showToast("❌ Upload failed!");
      }
    } catch(err) {
      showToast("❌ Error uploading.");
    }
  }

  /* ── Init ───────────────────────────────────────── */
  function init(){
    createParticles();
    syncMemories().then(() => {
      const view = localStorage.getItem('currentView');
      if (view === 'private') {
         openCategory('private');
      } else if (view && view.startsWith('sub_')) {
         const subId = view.replace('sub_', '');
         openSubFolder(subId);
      } else if (view && view !== 'main' && CATEGORIES[view]) {
         openCategory(view);
      } else {
         show('photo-gallery');
      }
    });
  }
  init();
</script>
</body>
</html>
